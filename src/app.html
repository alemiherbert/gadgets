<!doctype html>
<html lang="en-UG">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
		
		<!-- Favicon -->
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta name="theme-color" content="#ea580c" />
		
		<!-- DNS Prefetch & Preconnect for Performance -->
		<link rel="dns-prefetch" href="https://fonts.googleapis.com" />
		<link rel="dns-prefetch" href="https://fonts.gstatic.com" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		
		<!-- Preload critical resources -->
		<link rel="preload" href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" as="style" />
		
		%sveltekit.head%
		
		<!-- Fonts - Load with display=swap for better performance -->
		<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet" />
		
		<!-- Additional SEO Meta Tags -->
		<meta name="author" content="Gadgets Store Uganda" />
		<meta name="language" content="English" />
		<meta name="revisit-after" content="7 days" />
		<meta name="rating" content="general" />
	</head>
	<body data-sveltekit-preload-data="hover">
		<div class="font-sans min-h-screen bg-white text-gray-900" style="display: contents">%sveltekit.body%</div>
	</body>
</html>
